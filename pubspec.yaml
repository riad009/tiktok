name: artistcase
description: "Artistcase - A TikTok-style social media app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Routing
  go_router: ^14.8.1
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.5
  # Media
  video_player: ^2.9.3
  chewie: ^1.8.5
  image_picker: ^1.1.2
  video_compress: ^3.1.3
  cached_network_image: ^3.4.1
  # UI
  google_fonts: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  lottie: ^3.2.0
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  timeago: ^3.7.0
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  mime: ^2.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/
